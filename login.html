<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TecnoMarket</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">TecnoMarket</div>

        <input type="text" placeholder="Buscar..." class="buscador">

        <div class="hamburguesa" onclick="toggleMenu()">☰</div>

        <nav class="menu" id="menu">
            <a href="index.html">Inicio</a>
            <a href="tienda.html">Tienda</a>
            <a href="#">Artículos</a>
            <a href="#">Ofertas</a>
            <a href="#">Contacto</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero-login">
        <div class="hero-login-texto">
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu cuenta para gestionar tus compras y pedidos.</p>
        </div>
    </section>

    <!-- CONTENIDO LOGIN -->
    <section class="contenedor-login">
        <div class="login-box">
            <div class="login-encabezado">
                <h2>Bienvenido</h2>
                <p>Ingresa tus datos para continuar.</p>
            </div>

            <form id="formLogin" class="form-login">
                <div class="grupo-input">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <div class="input-password">
                        <input type="password" id="password" placeholder="********" required>
                        <button type="button" class="btn-ver" onclick="togglePassword()">👁</button>
                    </div>
                </div>

                <div class="opciones-login">
                    <label class="recordar-box">
                        <input type="checkbox" id="recordar">
                        <span>Recordarme</span>
                    </label>

                    <a href="#" class="link-recuperar">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>

                <p id="mensajeLogin" class="mensaje-login"></p>
            </form>

            <div class="login-footer">
                <p>¿No tienes cuenta?</p>
                <a href="registro.html">Crear cuenta</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 TecnoMarket - Todos los derechos reservados</p>
    </footer>

    <script src="js/login.js"></script>
</body>
</html>
